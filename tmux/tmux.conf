# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'                    # Tmux Plugin Manager - manages all plugins
set -g @plugin 'tmux-plugins/tmux-sensible'          # Sensible defaults for tmux (better scrollback, faster key repetition, etc.)
set -g @plugin 'catppuccin/tmux'                     # Beautiful pastel theme for tmux status bar
set -g @plugin 'tmux-plugins/tmux-yank'              # Copy to system clipboard (y in copy mode, prefix+y for command line)
set -g @plugin 'tmux-plugins/tmux-resurrect'         # Save and restore tmux sessions (prefix+Ctrl+s to save, prefix+Ctrl+r to restore)
set -g @plugin 'tmux-plugins/tmux-continuum'         # Auto-save sessions periodically and restore on tmux start

# Resurrect & Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'
set -g @resurrect-capture-pane-contents 'on'


# Fix session name truncation
set -g status-left-length 100
set -g status-right-length 100

# Show directory basename as window name instead of hostname
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
